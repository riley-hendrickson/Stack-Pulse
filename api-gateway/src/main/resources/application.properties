spring.application.name=api-gateway
server.port=8080
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
spring.cloud.gateway.routes[0].id=query-api
spring.cloud.gateway.routes[0].uri=lb://query-api-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/keywords/**
spring.main.allow-bean-definition-overriding=true
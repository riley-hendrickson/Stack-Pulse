services:
  postgres:
    image: postgres:16
    container_name: stackpulse-db
    environment:
      POSTGRES_DB: stackpulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  eureka-server:
    build: ./eureka-server
    container_name: stackpulse-eureka
    ports:
      - "8761:8761"

  scraper-service:
    build: ./scraper-service
    container_name: stackpulse-scraper
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/stackpulse
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      MUSE_API_KEY: ${MUSE_API_KEY}
    depends_on:
      - postgres
      - eureka-server

  query-api-service:
    build: ./query-api-service
    container_name: stackpulse-query-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/stackpulse
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - eureka-server

  api-gateway:
    build: ./api-gateway
    container_name: stackpulse-gateway
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
      - query-api-service

volumes:
  postgres-data: